<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drekee AI</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        /* Claude-style Artifacts CSS */
        .claude-artifact-container {
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .artifact-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .artifact-card:hover {
            border-color: rgba(59, 130, 246, 0.5) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .artifact-content-area::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .artifact-content-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .artifact-content-area::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 4px;
        }

        .artifact-content-area::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.5);
        }

        /* Animação de entrada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-artifact {
            animation: slideUp 0.5s ease-out forwards;
        }
    
        /* Reset e configuração básica da página */
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #080911; /* Fundo escuro levemente azulado/profundo */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Névoa/brilho de fundo para dar o tom futurista */
        .background-glow {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 60% 50%, rgba(110, 130, 255, 0.15) 0%, rgba(0, 0, 0, 0) 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Container principal para alinhar título e input */
        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        /* Estilo do título "Drekee AI" grande e com gradiente */
        .title {
            font-size: clamp(70px, 12vw, 150px);
            font-weight: 800;
            letter-spacing: -3px;
            margin: 0;
            padding: 0;
            /* Gradiente simulando a luz vindo da direita */
            background: linear-gradient(90deg, rgba(40,40,50,0.4) 0%, rgba(120,135,180,0.8) 40%, #ffffff 80%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: -40px; /* Puxa a caixa de input para cima do texto */
            position: relative;
            z-index: 1;
            user-select: none;
        }

        /* Caixa de pesquisa (Input container) */
        .search-container {
            position: relative;
            width: 90%;
            max-width: 750px;
            background-color: #111111; /* Fundo escuro sólido */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Borda cinza sutil */
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 16px 20px 16px 30px;
            z-index: 2;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6); /* Sombra para destacar do fundo */
        }

        /* Campo de texto (Input) */
        .search-container input {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 17px;
            font-family: inherit;
        }

        .search-container input::placeholder {
            color: #888888;
            font-weight: 400;
        }

        /* Botão de envio (Seta) */
        .submit-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background-color: #999999;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.2s ease;
            flex-shrink: 0;
            margin-left: 15px;
        }

        .submit-btn:hover {
            background-color: #ffffff;
        }

        /* Ícone da seta em SVG */
        .submit-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #111111;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>
    
    <div class="container">
        <h1 class="title">Drekee AI</h1>
        
        <div class="search-container">
            <input type="text" placeholder="O que você quer saber?">
            <button class="submit-btn" aria-label="Enviar">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M12 5L6 11M12 5L18 11" />
                </svg>
            </button>
        </div>
    </div>

</body>
</html>
