<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - Drekee AI 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6",
                        "background-light": "#F0F9FF",
                        "background-dark": "#0F172A",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#1E293B",
                        "text-main-light": "#1E293B",
                        "text-main-dark": "#F8FAFC",
                        "sidebar-light": "#F8FAFC",
                        "sidebar-dark": "#1E293B",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                        sans: ["'Plus Jakarta Sans'", "sans-serif"],
                        inter: ["'Inter'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                        'xl': '1rem',
                        '2xl': '1.5rem',
                        '3xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(59, 130, 246, 0.1)',
                        'input': '0 10px 40px -10px rgba(59, 130, 246, 0.15)',
                    }
                },
            },
        };
    </script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
        }
        
        .auth-button {
            transition: all 0.3s ease;
            transform: translateY(0);
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.25);
        }
        
        .input-field {
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px -2px rgba(59, 130, 246, 0.15);
        }
        
        video {
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-5">
        <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="0.4"%3E%3Ccircle cx="7" cy="7" r="7"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');"></div>
    </div>

    <!-- Login Card -->
    <div class="relative z-10 w-full max-w-md">
        <div class="glass-effect rounded-[2rem] p-8 shadow-2xl">
            <!-- Video Header -->
            <div class="text-center mb-8">
                <video 
                    autoplay 
                    muted 
                    loop 
                    playsinline 
                    class="w-24 h-24 rounded-2xl object-cover mx-auto mb-4 shadow-lg"
                >
                    <source src="img/Video Project.mp4" type="video/mp4">
                </video>
                <h1 class="text-2xl font-bold text-white mb-2">Bem-vindo ao Drekee AI</h1>
                <p class="text-gray-300 text-sm">Faça login para salvar suas conversas</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-2">
                        Email
                    </label>
                    <div class="relative">
                        <span class="material-icons-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm">
                            email
                        </span>
                        <input
                            type="email"
                            id="email"
                            required
                            class="input-field w-full pl-10 pr-4 py-3 bg-gray-800/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="seu@email.com"
                        />
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-200 mb-2">
                        Senha
                    </label>
                    <div class="relative">
                        <span class="material-icons-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm">
                            lock
                        </span>
                        <input
                            type="password"
                            id="password"
                            required
                            class="input-field w-full pl-10 pr-12 py-3 bg-gray-800/50 border border-gray-600 rounded-xl text-white placeholder-gray-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none"
                            placeholder="••••••••"
                        />
                        <button
                            type="button"
                            id="togglePassword"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-300 transition-colors"
                        >
                            <span class="material-icons-outlined text-sm">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-primary bg-gray-800/50 border-gray-600 rounded focus:ring-primary">
                        <span class="ml-2 text-sm text-gray-300">Lembrar de mim</span>
                    </label>
                    <a href="#" class="text-sm text-primary hover:text-primary/80 transition-colors">Esqueceu a senha?</a>
                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    id="loginBtn"
                    class="auth-button w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                >
                    <span class="material-icons-outlined text-sm">login</span>
                    Entrar
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-600"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-transparent text-gray-400">ou continue com</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="space-y-3">
                <button
                    id="googleLogin"
                    class="auth-button w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-200 font-medium py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-3"
                >
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="text-center mt-6">
                <p class="text-sm text-gray-300">
                    Não tem uma conta? 
                    <a href="#" id="showSignup" class="text-primary hover:text-primary/80 font-medium transition-colors">Cadastre-se</a>
                </p>
            </div>

            <!-- Guest Button -->
            <div class="mt-8 pt-6 border-t border-gray-600">
                <button
                    id="guestBtn"
                    class="w-full bg-gray-700/50 hover:bg-gray-700 text-gray-300 font-medium py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                >
                    <span class="material-icons-outlined text-sm">person_outline</span>
                    Continuar como Visitante
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden">
        <div class="flex items-center justify-center h-full">
            <div class="bg-gray-800 rounded-xl p-6 flex items-center gap-3">
                <div class="animate-spin w-5 h-5 border-2 border-primary border-t-transparent rounded-full"></div>
                <span class="text-gray-300">Carregando...</span>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-gray-800 rounded-lg shadow-lg p-4 flex items-center gap-3 min-w-[300px]">
            <span id="toastIcon" class="material-icons-outlined text-lg"></span>
            <div>
                <p id="toastMessage" class="text-gray-300 text-sm font-medium"></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
